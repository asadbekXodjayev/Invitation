<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cutie Date App 💖</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Comic Sans MS", cursive;
        }

        html {
            font-size: 16px;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 1rem;
            background: radial-gradient(circle at top, #ffd6ec, #ffb6d9, #ff9fcb);
        }

        /* 💖 HEARTS BACKGROUND */
        .hearts {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }

        .heart {
            position: absolute;
            pointer-events: none;
            animation: floatUp linear forwards;
            opacity: 0.9;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(120vh) scale(0.6);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            100% {
                transform: translateY(-130vh) scale(1.4);
                opacity: 0;
            }
        }

        /* 💖 CARD */
        .card {
            width: 100%;
            max-width: 42rem;
            min-height: 42rem;

            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(0.4rem);

            border: 0.25rem solid rgba(255, 255, 255, 0.5);
            border-radius: 2.5rem;

            position: relative;
            z-index: 10;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            padding: 2rem;
            text-align: center;

            box-shadow: 0 0.6rem 2.5rem rgba(255, 105, 180, 0.4);
        }

        h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            color: #ff2d7a;
            margin-bottom: 1rem;
        }

        .cute-text {
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: #ff5c9f;
            margin-bottom: 1rem;
        }

        img {
            width: 70%;
            max-width: 18rem;
            border-radius: 1.5rem;
            border: 0.3rem solid white;
            margin-bottom: 2rem;
        }

        .buttons {
            position: relative;
            width: 100%;
            height: 12rem;
        }

        button {
            position: absolute;
            border: none;
            padding: 1rem 2rem;
            border-radius: 999rem;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
        }

        #yesBtn {
            background: linear-gradient(135deg, #ff4f9a, #ff89c0);
            color: white;
            left: 20%;
            top: 3rem;
        }

        #noBtn {
            background: white;
            color: #ff4f9a;
            right: 20%;
            top: 3rem;
        }

        /* 💥 SHATTER */
        .shatter {
            animation: shatter 0.6s forwards;
        }

        @keyframes shatter {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(0) rotate(200deg);
                opacity: 0;
            }
        }

        /* 💖 KISS POP */
        .kiss-pop {
            position: fixed;
            font-size: 2rem;
            animation: kissPop 0.8s forwards;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes kissPop {
            0% {
                transform: scale(0);
                opacity: 1;
            }

            50% {
                transform: scale(1.6);
            }

            100% {
                transform: scale(0.8) translateY(-6rem);
                opacity: 0;
            }
        }

        .final-message {
            margin-top: 1rem;
            font-size: 1.5rem;
            color: #ff2d7a;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            50% {
                transform: scale(1.1);
            }
        }

        @media (max-width: 40rem) {
            html {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="hearts"></div>

    <div class="card">

        <h1>Will you go on a date with me? 💌</h1>

        <div class="cute-text">hii cutie pie 💕 you’re adorable 🥺</div>

        <img src="cute.gif" />

        <div class="buttons">
            <button id="yesBtn">YES 💖</button>
            <button id="noBtn">NO 😭</button>
        </div>

        <div class="final-message" id="finalMessage"></div>

    </div>

    <script>

        /* 💖 SOUND */
        const sounds = {
            pop: new Audio("https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"),
            success: new Audio("https://assets.mixkit.co/active_storage/sfx/3015/3015-preview.mp3"),
            boop: new Audio("https://assets.mixkit.co/active_storage/sfx/270/270-preview.mp3")
        };

        function play(s) {
            try {
                sounds[s].currentTime = 0;
                sounds[s].play();
            } catch { }
        }

        /* 📱 VIBRATION */
        function vibrate(v) {
            if (navigator.vibrate) navigator.vibrate(v);
        }

        const noBtn = document.getElementById("noBtn");
        const yesBtn = document.getElementById("yesBtn");
        const finalMessage = document.getElementById("finalMessage");

        let moveCount = 0;
        let broken = false;

        /* 💥 NO BUTTON */
        function moveNo() {

            if (broken) return;

            moveCount++;

            play("boop");
            vibrate(20);

            if (moveCount >= 4) {

                broken = true;

                noBtn.classList.add("shatter");

                play("pop");
                vibrate([50, 30, 50]);

                createShatter();

                setTimeout(() => noBtn.remove(), 600);

                yesBtn.style.left = "50%";
                yesBtn.style.top = "50%";
                yesBtn.style.transform = "translate(-50%,-50%) scale(1.5)";

                finalMessage.innerHTML = "you only have YES now cutie 💘";

                return;
            }

            noBtn.style.left = Math.random() * 60 + "%";
            noBtn.style.top = Math.random() * 60 + "%";
        }

        noBtn.addEventListener("mouseenter", moveNo);
        noBtn.addEventListener("click", moveNo);

        /* 💥 SHATTER EFFECT */
        function createShatter() {

            for (let i = 0; i < 40; i++) {

                const el = document.createElement("div");
                el.className = "kiss-pop";

                el.innerHTML = ["💖", "💔", "✨", "🎀", "💥"][Math.floor(Math.random() * 5)];

                el.style.left = noBtn.offsetLeft + "px";
                el.style.top = noBtn.offsetTop + "px";

                el.style.transform =
                    `translate(${(Math.random() - 0.5) * 400}px,
                       ${(Math.random() - 0.5) * 400}px)`;

                document.body.appendChild(el);

                setTimeout(() => el.remove(), 800);
            }
        }

        /* 💖 YES BUTTON */
        yesBtn.addEventListener("click", () => {

            play("success");
            vibrate([80, 50, 80]);

            finalMessage.innerHTML = "💖 YAY CUTIE 💖";

            for (let i = 0; i < 25; i++) {

                const kiss = document.createElement("div");
                kiss.className = "kiss-pop";

                kiss.innerHTML = ["💖", "💋", "💕", "🎀", "✨"][Math.floor(Math.random() * 5)];

                kiss.style.left = Math.random() * 100 + "vw";
                kiss.style.top = Math.random() * 100 + "vh";

                document.body.appendChild(kiss);

                setTimeout(() => kiss.remove(), 800);
            }

            document.body.style.background =
                "radial-gradient(circle at top, #fff0f6, #ffb6d9, #ff4f9a)";
        });

        /* 💖 FLOATING HEARTS */
        function hearts() {

            const box = document.querySelector(".hearts");

            setInterval(() => {

                for (let i = 0; i < 8; i++) {

                    const h = document.createElement("div");
                    h.className = "heart";

                    h.innerHTML = ["💖", "💕", "💘", "🎀"][Math.floor(Math.random() * 4)];

                    h.style.left = Math.random() * 100 + "vw";
                    h.style.fontSize = (1 + Math.random() * 2) + "rem";

                    box.appendChild(h);

                    setTimeout(() => h.remove(), 8000);
                }

            }, 150);
        }

        hearts();

    </script>

</body>

</html>
